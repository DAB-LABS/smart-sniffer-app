name: "SMART Sniffer App"
description: "Monitors the health of your Home Assistant system drive. Reads SMART data from local hardware and reports it to the SMART Sniffer integration as HA entities."
version: "0.2.10"
slug: "smart_sniffer_agent"
url: "https://github.com/DAB-LABS/smart-sniffer-app"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto

# Network
ports:
  9099/tcp: 9099
ports_description:
  9099/tcp: "SMART Sniffer Agent API"

# Drive access — smartctl needs raw I/O to read SMART data from host drives.
# SYS_RAWIO: required for SATA drives (SG_IO ioctls)
# SYS_ADMIN: required for NVMe drives (NVMe admin passthrough commands)
privileged:
  - SYS_RAWIO
  - SYS_ADMIN

# Full hardware access — required for smartctl to open drive device nodes.
# Without this, the container's /dev is read-only and the device cgroup blocks
# raw I/O to drives. This is the same approach Scrutiny uses.
# Users must also disable Protection Mode in the app settings for drive access.
full_access: true

# Supervisor API access — needed to query HA hostname for unique mDNS names
hassio_api: true

# AppArmor — custom profile (apparmor.txt) provides the Protection Mode toggle
# in the HA UI and documents what the container actually accesses.
# Security note: Protection Mode must be OFF for drive monitoring to work.
# With full_access + custom apparmor, score is approximately 4/8.

# Ingress — serves the unified web UI inside the HA sidebar
ingress: true
ingress_port: 8099
ingress_entry: /
panel_icon: mdi:harddisk
panel_title: "SMART Sniffer"

# Health monitoring
watchdog: "http://[HOST]:[PORT:9099]/api/health"

# User-configurable options
options:
  port: 9099
  token: ""
  scan_interval: 60
  mock_mode: false
  mock_port: 9100
schema:
  port: port
  token: "str?"
  scan_interval: "int(10,3600)"
  mock_mode: bool
  mock_port: port

# Container image (uncomment for published releases, must be removed for local builds)
# image: "ghcr.io/dab-labs/{arch}-smart-sniffer-agent"

# Mark as experimental during development
stage: experimental
